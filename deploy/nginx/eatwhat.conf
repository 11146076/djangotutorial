# Nginx Virtual Host — 等等吃啥 Django Application
# 安裝：sudo cp deploy/nginx/eatwhat.conf /etc/nginx/sites-available/eatwhat.conf

upstream eatwhat_gunicorn {
    server unix:/run/eatwhat/gunicorn.sock fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name your.domain.com www.your.domain.com;

    client_max_body_size 12M;

    access_log /var/log/nginx/eatwhat.access.log;
    error_log  /var/log/nginx/eatwhat.error.log;

    # HTTPS 請取消註解並設定憑證
    # listen 443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/your.domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your.domain.com/privkey.pem;

    location = /favicon.ico { access_log off; log_not_found off; }

    location /static/ {
        alias /srv/eatwhat/app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /srv/eatwhat/app/media/;
        expires 7d;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
        proxy_pass http://eatwhat_gunicorn;
    }
}
