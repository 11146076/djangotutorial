{% load i18n %}
<form action="{% url 'set_language' %}" method="post" class="inline-flex items-center">
  {% csrf_token %}
  <input type="hidden" name="next" value="{{ request.get_full_path }}">
  <label for="lang-switch" class="sr-only">{% trans "Language" %}</label>
  <select
    id="lang-switch"
    name="language"
    class="saas-input min-h-9 rounded-lg border px-2 py-1 text-xs sm:text-sm"
    onchange="this.form.submit()"
  >
    {% get_current_language as CURRENT_LANG %}
    {% get_available_languages as AVAILABLE_LANGUAGES %}
    {% for lang_code, lang_name in AVAILABLE_LANGUAGES %}
      <option value="{{ lang_code }}" {% if lang_code == CURRENT_LANG %}selected{% endif %}>{{ lang_name }}</option>
    {% endfor %}
  </select>
</form>
