{# 圖片驗證碼 + 我不是機器人（登入／註冊共用） #}
<div class="mb-4">
  <label class="mb-2 block text-sm font-medium text-slate-600">{{ form.captcha.label }}</label>
  <div class="auth-captcha flex flex-wrap items-center gap-3">
    {{ form.captcha }}
  </div>
  {% if form.captcha.errors %}
    <p class="mt-1 text-sm text-rose-600">{{ form.captcha.errors.0 }}</p>
  {% endif %}
  <p class="mt-1 text-xs text-slate-500">看不清可點圖片換一組</p>
</div>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".auth-captcha").forEach((wrap) => {
      const img = wrap.querySelector("img");
      if (!img) return;
      img.title = "點擊換一張驗證碼";
      img.addEventListener("click", async () => {
        try {
          const res = await fetch("{% url 'captcha-refresh' %}", {
            headers: { "X-Requested-With": "XMLHttpRequest" },
            credentials: "same-origin",
          });
          if (!res.ok) return;
          const data = await res.json();
          const keyInput = wrap.querySelector('input[name$="captcha_0"]');
          const textInput = wrap.querySelector('input[name$="captcha_1"]');
          if (keyInput && data.key) keyInput.value = data.key;
          if (data.image_url) img.src = data.image_url;
          if (textInput) {
            textInput.value = "";
            textInput.focus();
          }
        } catch (err) {
          console.error(err);
        }
      });
    });
  });
</script>

<div class="mb-5 rounded-xl border border-slate-200 bg-brand-muted/60 px-4 py-3">
  <div class="flex items-start gap-3">
    {{ form.not_robot }}
    <label for="{{ form.not_robot.id_for_label }}" class="cursor-pointer text-sm font-medium leading-snug text-slate-700">
      <span class="flex items-center gap-2">
        <i class="fa-solid fa-shield-halved text-brand-teal" aria-hidden="true"></i>
        {{ form.not_robot.label }}
      </span>
      <span class="mt-0.5 block text-xs font-normal text-slate-500">請勾選以確認您為真人使用者</span>
    </label>
  </div>
  {% if form.not_robot.errors %}
    <p class="mt-2 text-sm text-rose-600">{{ form.not_robot.errors.0 }}</p>
  {% endif %}
</div>
